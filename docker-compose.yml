services:
  water-rescue-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: water-rescue-ai:latest
    container_name: water-rescue-ai
    ports:
      - "8504:8501"
    environment:
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      HF_HOME: "/home/appuser/.cache/huggingface"
      MPLCONFIGDIR: "/tmp/matplotlib"
      YOLO_CONFIG_DIR: "/tmp/ultralytics"
    volumes:
      - water-rescue-hf-cache:/home/appuser/.cache/huggingface
      - water-rescue-ultralytics:/tmp/ultralytics
    restart: unless-stopped

volumes:
  water-rescue-hf-cache:
  water-rescue-ultralytics:
